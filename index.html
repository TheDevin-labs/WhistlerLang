<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhistlerLang Hub</title>
    <style>
        body {
            background-color: #2c2c2c;
            color: #e0e0e0;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .top-left-img {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 80px;
            height: auto;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 320px;
        }

        .btn {
            background-color: #3d3d3d;
            border: 1px solid #555;
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #505050;
            transform: translateY(-2px);
        }

        .btn span {
            font-size: 18px;
            font-weight: bold;
        }

        .btn img {
            width: 30px;
            height: 30px;
        }
    </style>
</head>
<body>

    <img src="web" class="top-left-img">

    <div class="container">
        
        <a href="https://GitHub.com/TheDevin-labs" class="btn" target="_blank">
            <span>Team</span>
            <img src="web/team.png">
        </a>

        <a href="https://github.com/TheDevin-labs/WhistlerLang" class="btn" target="_blank">
            <span>Gateway</span>
            <img src="web/gateway.png">
        </a>

        <a href="mailto:devinlabs@proton.me" class="btn">
            <span>Contact</span>
            <img src="web/contact.png">
        </a>

    </div>

</body>
</html>
